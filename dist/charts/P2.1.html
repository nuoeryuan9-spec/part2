<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高温对人体六大系统影响</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.hc-wrap{width:70%;max-width:322px;aspect-ratio:105/148.5;position:relative;background:transparent;margin:0 auto}
.hc-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:30%;aspect-ratio:1;border:0;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;z-index:0;pointer-events:none}
.hc-center img{display:block;width:100%;height:100%;object-fit:contain;border:0;background:transparent}
@keyframes hc-pulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.05);opacity:.5}}
.hc-lines{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
.hc-box{position:absolute;width:28%;padding:7px 9px;border-radius:12px;border:.5px solid rgba(200,120,40,.15);border-left:3px solid var(--c);background:rgba(255,250,245,.94);cursor:pointer;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s,border-color .3s;z-index:2;transform:translate(-50%,-50%)}
.hc-box:hover{transform:translate(-50%,-50%) scale(1.06);border-color:rgba(200,120,40,.3)}
.hc-box.dim{opacity:.35}
.hc-box.open{z-index:10;transform:translate(-50%,-50%) scale(1.03)}
.hc-head{display:flex;align-items:center;gap:5px;margin-bottom:1px}
.hc-dot{width:7px;height:7px;border-radius:50%;background:var(--c);flex-shrink:0}
.hc-title{font-size:13px;font-weight:500;color:var(--ct);line-height:1.3}
.hc-brief{font-size:11px;color:rgba(140,70,20,.5);line-height:1.4}
.hc-detail{font-size:11px;color:rgba(120,60,15,.6);line-height:1.6;max-height:0;overflow:hidden;transition:max-height .4s ease,margin .3s,opacity .3s,padding .3s;opacity:0}
.hc-box.open .hc-detail{max-height:150px;margin-top:5px;padding-top:5px;border-top:.5px solid rgba(200,120,40,.12);opacity:1}
</style>
</head>
<body>
<h2 class="sr-only">高温对人体六大系统影响交互可视化</h2>
<div class="hc-wrap" id="hcWrap">
<svg class="hc-lines" viewBox="0 0 100 141.4" preserveAspectRatio="none">
<line x1="50" y1="30" x2="50" y2="50" stroke="rgba(200,100,40,.1)" stroke-width=".4" stroke-dasharray="1.5 1.5"/>
<line x1="70" y1="51" x2="61" y2="60" stroke="rgba(200,100,40,.1)" stroke-width=".4" stroke-dasharray="1.5 1.5"/>
<line x1="70" y1="91" x2="61" y2="82" stroke="rgba(200,100,40,.1)" stroke-width=".4" stroke-dasharray="1.5 1.5"/>
<line x1="50" y1="112" x2="50" y2="92" stroke="rgba(200,100,40,.1)" stroke-width=".4" stroke-dasharray="1.5 1.5"/>
<line x1="30" y1="91" x2="39" y2="82" stroke="rgba(200,100,40,.1)" stroke-width=".4" stroke-dasharray="1.5 1.5"/>
<line x1="30" y1="51" x2="39" y2="60" stroke="rgba(200,100,40,.1)" stroke-width=".4" stroke-dasharray="1.5 1.5"/>
</svg>
<div class="hc-center"><img src="../assets/part2/P1.1的中间图.png" alt="" decoding="async" draggable="false"></div>
<div class="hc-box" data-id="1" style="--c:#C0392B;--ct:#7B241C;top:15%;left:50%">
<div class="hc-head"><span class="hc-dot"></span><span class="hc-title">心脑血管系统</span></div>
<div class="hc-brief">高危人群首当其冲</div>
<div class="hc-detail">血管扩张，心脏负荷飙升<br>大量出汗致血液黏稠<br>胸闷、心慌<br>高血压·心梗·中风风险升高</div>
</div>
<div class="hc-box" data-id="2" style="--c:#E67E22;--ct:#9C540A;top:33%;left:82%">
<div class="hc-head"><span class="hc-dot"></span><span class="hc-title">中枢神经系统</span></div>
<div class="hc-brief">热射病前兆预警</div>
<div class="hc-detail">头晕、乏力、注意力下降<br>失眠<br>意识模糊、抽搐<br>热射病典型前兆</div>
</div>
<div class="hc-box" data-id="3" style="--c:#E84393;--ct:#9B1B5E;top:67%;left:82%">
<div class="hc-head"><span class="hc-dot"></span><span class="hc-title">呼吸系统</span></div>
<div class="hc-brief">旧病复发率升高</div>
<div class="hc-detail">呼吸道黏膜受刺激<br>咽喉干痛、胸闷气短<br>哮喘、慢支复发率升高</div>
</div>
<div class="hc-box" data-id="4" style="--c:#D4730E;--ct:#8B4D08;top:85%;left:50%">
<div class="hc-head"><span class="hc-dot"></span><span class="hc-title">消化系统</span></div>
<div class="hc-brief">食欲下降·肠胃炎</div>
<div class="hc-detail">肠胃蠕动受抑<br>消化液分泌减少<br>食欲下降、腹胀、便秘<br>急性肠胃炎风险升高</div>
</div>
<div class="hc-box" data-id="5" style="--c:#CB6015;--ct:#7A3A0E;top:67%;left:18%">
<div class="hc-head"><span class="hc-dot"></span><span class="hc-title">泌尿系统</span></div>
<div class="hc-brief">肾脏负担加重</div>
<div class="hc-detail">水分快速流失<br>尿液浓缩<br>尿频、尿痛<br>肾结石·尿路感染风险升高</div>
</div>
<div class="hc-box" data-id="6" style="--c:#EF9F27;--ct:#8B5A06;top:33%;left:18%">
<div class="hc-head"><span class="hc-dot"></span><span class="hc-title">皮肤</span></div>
<div class="hc-brief">最大散热器官受损</div>
<div class="hc-detail">汗腺超负荷工作<br>痱子、晒伤<br>毛孔堵塞致皮炎<br>皮肤感染</div>
</div>
</div>
<script>
(function(){var w=document.getElementById('hcWrap'),b=w.querySelectorAll('.hc-box');
b.forEach(function(x){x.addEventListener('click',function(e){e.stopPropagation();
var o=x.classList.contains('open');
b.forEach(function(y){y.classList.remove('open');y.classList.remove('dim')});
if(!o){x.classList.add('open');b.forEach(function(y){if(y!==x)y.classList.add('dim')})}})});
w.addEventListener('click',function(e){if(e.target===w||e.target.closest('.hc-center')){
b.forEach(function(y){y.classList.remove('open');y.classList.remove('dim')})}})})();
</script>
</body>
</html>
