<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热浪经济损失</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:280px;height:397px;
  background:transparent;
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  overflow:hidden;
  position:relative;
}
.scene{width:100%;height:100%;position:relative}

/* 标题 */
.title{
  position:absolute;top:6px;left:50%;transform:translateX(-50%);
  font-size:14px;font-weight:900;text-align:center;color:#333;
  letter-spacing:0.5px;white-space:nowrap;z-index:10;
  text-shadow:0 1px 0 rgba(255,255,255,0.7);
}

/* 中央劳动者 */
.center-worker{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  z-index:5;
  cursor:pointer;
  transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);
}
.center-worker:hover{
  transform:translate(-50%,-50%) scale(1.08) rotate(3deg);
}
.worker-bounce{
  animation:workerPulse 2s ease-in-out infinite;
}
@keyframes workerPulse{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-4px) scale(1.03)}
}

/* 周围数据节点 */
.data-node{
  position:absolute;
  cursor:pointer;
  transition:all 0.3s ease;
  z-index:6;
}
.data-node:hover{
  transform:scale(1.12) !important;
  z-index:20;
}
.data-node:hover .node-icon{filter:brightness(1.2) drop-shadow(0 0 8px rgba(245,124,0,0.5))}
.data-node:hover .node-value{color:#D84315}
.data-node.active{z-index:20}

.node-icon{
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  box-shadow:0 3px 12px rgba(230,81,0,0.25),0 1px 4px rgba(0,0,0,0.1);
  transition:all 0.3s ease;
  background:#FFF3E0;
  border:2.5px solid #FF9800;
}
.node-icon svg{transition:all 0.3s ease}

.node-value{
  position:absolute;font-weight:900;font-style:italic;
  text-align:center;line-height:1;white-space:nowrap;
  pointer-events:none;
  text-shadow:1px 1px 0 rgba(255,255,255,0.8),2px 2px 4px rgba(0,0,0,0.1);
  transition:color 0.3s ease,color 0.3s ease;
}

.node-label{
  position:absolute;font-size:10px;font-weight:700;
  color:#555;text-align:center;
  letter-spacing:0.3px;pointer-events:none;
  white-space:nowrap;
  text-shadow:0 1px 0 rgba(255,255,255,0.6);
  line-height:1.25;
  max-width:90px;
}

.node-sub{
  position:absolute;font-size:8px;color:#999;
  text-align:center;pointer-events:none;
  white-space:nowrap;
}

/* 连接线 */
.conn-line{
  position:absolute;pointer-events:none;z-index:1;
  stroke:#FFB74D;stroke-width:1.5;fill:none;
  stroke-dasharray:5 4;opacity:0.45;
  animation:connDash 20s linear infinite;
}
@keyframes connDash{to{stroke-dashoffset:-100}}

/* 信息卡片 */
.info-card{
  position:absolute;display:none;
  background:rgba(255,255,255,0.97);
  border-radius:12px;padding:11px 13px;
  box-shadow:0 8px 28px rgba(0,0,0,0.18),0 2px 10px rgba(0,0,0,0.08);
  z-index:100;min-width:165px;max-width:210px;
  animation:cardIn 0.25s ease;border:1.5px solid #FFE0B2;
}
@keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(0.92)}to{opacity:1;transform:translateY(0) scale(1)}}
.info-card h4{font-size:13px;margin-bottom:5px;color:#E65100;border-bottom:2px solid #FFCC80;padding-bottom:4px}
.info-card p{font-size:11px;line-height:1.55;color:#444}
.info-card .src{font-size:9px;color:#aaa;margin-top:6px;border-top:1px dashed #eee;padding-top:4px}

/* 入场 */
@keyframes nodePop{0%{opacity:0;transform:scale(0)}60%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
@keyframes centerIn{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3) rotate(-15deg)}100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}}
</style>
</head>
<body>
<div class="scene">

  <div class="title">热浪经济损失核心数据</div>

  <!-- 连接线 SVG -->
  <svg class="conn-svg" width="280" height="397" style="position:absolute;top:0;left:0;z-index:1">
    <!-- 左上 -->
    <path class="conn-line" d="M140,198 Q80,160 56,95"/>
    <!-- 右上 -->
    <path class="conn-line" d="M140,198 Q200,155 228,96"/>
    <!-- 左下 -->
    <path class="conn-line" d="M140,198 Q85,250 54,310"/>
    <!-- 右下 -->
    <path class="conn-line" d="M140,198 Q195,255 226,315"/>
  </svg>

  <!-- 中央劳动者 -->
  <div class="center-worker" id="centerWorker">
    <div class="worker-bounce">
      <svg width="72" height="78" viewBox="0 0 72 78">
        <!-- 人物轮廓图标 - 黄色线条 -->
        <g fill="none" stroke="#FFD54F" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
          <!-- 头部圆形 -->
          <circle cx="36" cy="22" r="16"/>
          <!-- 身体/肩膀弧线 -->
          <path d="M10,68 C10,48 18,42 36,42 C54,42 62,48 62,68"/>
        </g>
        <!-- 微笑装饰 -->
        <path d="M29,25 Q36,32 43,25" fill="none" stroke="#FFC107" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- 节点1: 劳动力损失 (左上) -->
  <div class="data-node" id="n0" style="left:14px;top:58px">
    <div class="node-icon" style="width:48px;height:48px">
      <svg width="28" height="28" viewBox="0 0 24 24"><g fill="none" stroke="#E65100" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7" r="4"/><path d="M4 21v-3a5 5 0 0 1 5-5h6a5 5 0 0 1 5 5v3"/><path d="M16 3l2 2"/><path d="M18 5h4"/></g></svg>
    </div>
    <div class="node-value" style="left:50%;top:-22px;transform:translateX(-50%);color:#E65100;font-size:22px">2,826亿</div>
    <div class="node-label" style="left:50%;top:52px;transform:translateX(-50%)">潜在劳动生产力损失</div>
    <div class="node-sub" style="left:50%;top:66px;transform:translateX(-50%)">占GDP的 1.77%</div>
  </div>

  <!-- 节点2: 工时损失 (右上) -->
  <div class="data-node" id="n1" style="right:12px;top:54px">
    <div class="node-icon" style="width:48px;height:48px">
      <svg width="28" height="28" viewBox="0 0 24 24"><g fill="none" stroke="#E65100" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12,6 12,12 16,14"/><path d="M3 12h2M19 12h2M12 3v2M12 19v2"/></g></svg>
    </div>
    <div class="node-value" style="left:50%;top:-22px;transform:translateX(-50%);color:#EF6C00;font-size:22px">401亿</div>
    <div class="node-label" style="left:50%;top:52px;transform:translateX(-50%)">潜在工作小时损失</div>
    <div class="node-sub" style="left:50%;top:66px;transform:translateX(-50%)">(小时)</div>
  </div>

  <!-- 节点3: 经济损失 (左下) -->
  <div class="data-node" id="n2" style="left:8px;top:280px">
    <div class="node-icon" style="width:50px;height:50px">
      <svg width="30" height="30" viewBox="0 0 24 24"><g fill="none" stroke="#E65100" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><polyline points="17,7 12,2 7,7"/><polyline points="7,17 12,22 17,17"/><line x1="2" y1="12" x2="22" y2="12"/><polyline points="7,7 2,12 7,17"/><polyline points="17,7 22,12 17,17"/><circle cx="12" cy="12" r="3"/></g></svg>
    </div>
    <div class="node-value" style="left:50%;top:-24px;transform:translateX(-50%);color:#D84315;font-size:20px">4,270万</div>
    <div class="node-label" style="left:50%;top:54px;transform:translateX(-50%)">热浪死亡经济损失</div>
    <div class="node-sub" style="left:50%;top:68px;transform:translateX(-50%)">较上年增长 +127%</div>
  </div>

  <!-- 节点4: 行业占比 (右下) -->
  <div class="data-node" id="n3" style="right:6px;top:284px">
    <div class="node-icon" style="width:50px;height:50px">
      <svg width="30" height="30" viewBox="0 0 24 24"><g fill="none" stroke="#E65100" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><line x1="6.5" y1="10" x2="6.5" y2="14"/><line x1="17.5" y1="10" x2="17.5" y2="14"/><line x1="10" y1="17.5" x2="14" y2="17.5"/></g></svg>
    </div>
    <div class="node-value" style="left:50%;top:-24px;transform:translateX(-50%);color:#C62828;font-size:22px">38.9%</div>
    <div class="node-label" style="left:50%;top:54px;transform:translateX(-50%)">四大行业损失占比</div>
    <div class="node-sub" style="left:50%;top:68px;transform:translateX(-50%)" style="font-size:7px">农/建/制/服</div>
  </div>

  <!-- 信息卡片 -->
  <div class="info-card" id="infoCard">
    <h4 id="icTitle"></h4>
    <p id="icDesc"></p>
    <div class="src" id="icSrc"></div>
  </div>
</div>

<script>
(function(){
  var nodes = [
    {id:'n0', title:'潜在劳动生产力损失', val:'2,826亿美元',
     desc:'高温热浪导致中国劳动力生产效率大幅下降，户外劳动者和高温环境作业人群受影响最为严重，累计造成约2,826亿美元的潜在经济产值损失，相当于中国年度GDP的1.77%。',
     src:'ILO 国际劳工组织报告 / Lancet Countdown 2023'},
    {id:'n1', title:'潜在工作小时损失', val:'401亿美元',
     desc:'因极端高温导致的工作时间缩减，全年累计损失超过400亿美元。建筑、农业、制造业等户外密集型行业首当其冲，夏季高峰期日工作时间平均缩短2-4小时。',
     src:'世界银行气候经济评估 / 中国气象局'},
    {id:'n2', title:'热浪死亡经济损失', val:'4,270万美元',
     desc:'热浪相关死亡造成的直接和间接经济损失达4,270万美元，且以每年127%的速度急剧增长。包括医疗救治费用、劳动力永久性丧失、家庭收入损失等多重影响。',
     src:'Lancet Planetary Health 2024 / 中国CDC监测数据'},
    {id:'n3', title:'四大行业损失占比', val:'38.9%',
     desc:'农业、建筑业、制造业和服务业四大行业合计占全部热浪经济损失的38.9%。其中建筑业受影响最重（户外作业），其次为农业（作物减产）和制造业（车间降温成本上升）。',
     src:'国家统计局 / 行业协会综合数据'}
  ];

  var card=document.getElementById('infoCard');
  var icTitle=document.getElementById('icTitle');
  var icDesc=document.getElementById('icDesc');
  var icSrc=document.getElementById('icSrc');
  var activeEl=null;

  /* 入场动画 */
  var centerW=document.getElementById('centerWorker');
  centerW.style.opacity='0';
  setTimeout(function(){
    centerW.style.transition='opacity 0.5s ease';
    centerW.style.opacity='1';
    centerW.querySelector('.worker-bounce').style.animation='centerIn 0.6s ease forwards,workerPulse 2s ease-in-out infinite';
  },100);

  for(var i=0;i<nodes.length;i++){
    (function(idx){
      var el=document.getElementById(nodes[idx].id);
      el.style.opacity='0';
      el.style.transform='scale(0)';
      el.style.animation='none';
      setTimeout(function(){
        el.style.animation='nodePop 0.45s ease forwards';
      },300+idx*150);
    })(i);
  }

  function showInfo(data,target){
    icTitle.innerHTML=data.title+'<br><span style="font-size:18px;color:#E65100">'+data.val+'</span>';
    icDesc.textContent=data.desc;
    icSrc.textContent='数据来源：'+data.src;

    card.style.display='block';

    var sRect=target.getBoundingClientRect();
    var sceneRect=document.querySelector('.scene').getBoundingClientRect();

    var w=195,h=130;
    var left=sRect.left-sceneRect.left+sRect.width/2-w/2;
    var top=sRect.top-sceneRect.top-h-10;

    if(left<3){left=3;}
    if(left+w>277){left=277-w;}
    if(top<30){top=sRect.bottom-sceneRect.top+10;}

    card.style.left=left+'px';
    card.style.top=top+'px';
    card.style.width=Math.min(w,277-left-3)+'px';
  }

  function hideInfo(){
    card.style.display='none';
    activeEl=null;
  }

  for(var j=0;j<nodes.length;j++){
    (function(idx){
      var el=document.getElementById(nodes[idx].id);

      el.addEventListener('mouseenter',function(e){
        showInfo(nodes[idx],this);
        this.classList.add('active');
      });

      el.addEventListener('mouseleave',function(){
        hideInfo();
        this.classList.remove('active');
      });

      el.addEventListener('click',function(e){
        e.stopPropagation();
        if(activeEl===this){
          hideInfo();
        }else{
          showInfo(nodes[idx],this);
          activeEl=this;
        }
      });
    })(j);
  }

  /* 中央劳动者点击 */
  centerW.addEventListener('click',function(e){
    e.stopPropagation();
    icTitle.innerHTML='热浪中的劳动者';
    icDesc.textContent='高温热浪对劳动者群体的影响最为直接：体力下降、中暑风险剧增、工作效率显著降低。户外劳动者是热射病的高危人群，也是经济损失的主要承担者。保护劳动者健康=保护经济韧性。';
    icSrc.textContent='来源：国际劳工组织 ILO Heat Report / 中国职业安全健康研究';
    card.style.display='block';
    card.style.left='40px';
    card.style.top='145px';
    card.style.width='200px';
  });

  document.querySelector('.scene').addEventListener('click',function(e){
    if(e.target===this||e.target.classList.contains('title')||
       e.target.closest('.conn-svg')){
      hideInfo();
    }
  });
})();
</script>
</body>
</html>
