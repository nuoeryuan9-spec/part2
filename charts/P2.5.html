<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热射病救治时间窗与死亡率</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;width:100%;height:100%}
body{width:280px;height:397px;display:flex;flex-direction:column;align-items:center;padding:16px 10px 6px;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;position:relative;overflow:hidden}
.title{font-size:11px;font-weight:800;color:#5D4037;letter-spacing:.6px;text-align:center;line-height:1.35;margin-bottom:2px;width:100%}
.subtitle{font-size:6.5px;color:#8D6E63;text-align:center;margin-bottom:8px;font-weight:500}
.chart-wrap{position:relative;width:100%;flex:1;display:flex;justify-content:center;align-items:center}
svg.chart{width:100%;height:100%;display:block;overflow:visible}
.iso-group{cursor:pointer;transition:all .38s cubic-bezier(.34,1.56,.64,1)}
.iso-group:hover{filter:brightness(1.1)}
.stage-label{font-size:7px;font-weight:700;pointer-events:none}
.mortality-tag{font-size:6.5px;font-weight:900;pointer-events:none;opacity:0;transition:all .35s ease;text-anchor:middle}
.iso-group:hover .mortality-tag,.iso-group.active .mortality-tag{opacity:1}
.brief-text{font-size:5.5px;font-weight:500;pointer-events:none;fill:#6D4C41;opacity:0;transition:all .35s ease;text-anchor:middle}
.iso-group:hover .brief-text,.iso-group.active .brief-text{opacity:.85}
.tooltip-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border:2px solid rgba(230,120,30,.55);border-radius:11px;padding:8px 12px;text-align:center;min-width:115px;box-shadow:0 4px 18px rgba(200,80,20,.14);z-index:20;opacity:0;pointer-events:none;transition:all .32s cubic-bezier(.34,1.56,.64,1)}
.tooltip-box.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.tip-title{font-size:10px;font-weight:800;color:#BF360C}
.tip-row{font-size:8px;font-weight:600;color:#795548;margin-top:2.5px;line-height:1.35}
.tip-val{font-weight:900;color:#E65100}
.source-note{font-size:5.5px;color:#A1887F;text-align:center;margin-top:auto;padding-top:3px;font-style:italic;letter-spacing:.3px;width:100%;line-height:1.25;z-index:2}
@keyframes isoRise{from{opacity:0;transform:scaleY(0)}to{opacity:1;transform:scaleY(1)}}
.iso-group{transform-origin:center bottom;animation:isoRise .55s ease-out backwards}
</style>
</head>
<body>

<h1 class="title">热射病救治时间窗与死亡率</h1>
<p class="subtitle">时间就是生命 — 降温越早，生存率越高</p>

<div class="chart-wrap">
<svg class="chart" viewBox="-20 -15 300 250" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
<g id="floorGrid"></g>
<g id="columnsGroup"></g>
<g id="labelsGroup"></g>
</svg>

<div class="tooltip-box" id="tipBox">
<div class="tip-title" id="tipTitle"></div>
<div class="tip-row" id="tipTime"></div>
<div class="tip-row" id="tipReq"></div>
<div class="tip-row" id="tipRisk"></div>
<div class="tip-row" id="tipSrc"></div>
</div>
</div>

<p class="source-note">数据来源：《中国热射病诊断与治疗指南(2025版)》/ 科普中国 / CDC全国监测数据 / MSD诊疗手册</p>

<script>
var DATA=[
  {name:"黄金30分钟",time:"0 – 30 分钟",req:"立即启动降温",risk:"每延迟1分钟死亡率增加5%",mortLevel:1,mortPct:"+5%/分",src:"指南(2025版)/科普中国",c:"#F5DEB3",cL:"#E8C87A",cR:"#DBC56A"},
  {name:"白金1小时",time:"30 – 60 分钟",req:"核心体温降至38.5°C以下",risk:"未及时救治死亡率可达50–60%",mortLevel:2,mortPct:"50–60%",src:"搜狐健康/指南解读",c:"#FFD54F",cL:"#FFC107",cR:"#FFB300"},
  {name:"延迟救治(30+分钟)",time:"超过30分钟",req:"降温效果大打折扣",risk:"病死率大幅攀升",mortLevel:3,mortPct:"大幅攀升",src:"CDC全国监测数据",c:"#FF9800",cL:"#EF6C00",cR:"#E65100"},
  {name:"2小时窗口",time:"2小时内",req:"核心体温降至38.9°C以下",risk:"可避免不可逆器官损伤",mortLevel:4,mortPct:"超窗则不可逆",src:"MSD诊疗手册",c:"#E65100",cL:"#D84315",cR:"#BF360C"}
];

var ISO_ANGLE=Math.PI/6;
var CX=130,CY=195;
var COL_W=36,COL_D=22;
var BASE_H=22,MAX_H_ADD=88;

DATA.forEach(function(d,i){
  d.mortH=BASE_H+((d.mortLevel-1)/3)*MAX_H_ADD;
});

function isoProject(x,y,z){
  return {
    cx:CX+(x-y)*Math.cos(ISO_ANGLE),
    cy:CY-(x+y)*Math.sin(ISO_ANGLE)-z
  };
}

// 地面网格
var floorG=document.getElementById("floorGrid");
for(var gi=-2;gi<=3;gi++){
  var p1=isoProject(gi*COL_W,-2*COL_D,0);
  var p2=isoProject(gi*COL_W,3*COL_D,0);
  var fl=document.createElementNS("http://www.w3.org/2000/svg","line");
  fl.setAttribute("stroke","#E0D4C0");fl.setAttribute("stroke-width",".4");fl.setAttribute("opacity",".4");
  fl.setAttribute("x1",p1.cx);fl.setAttribute("y1",p1.cy);
  fl.setAttribute("x2",p2.cx);fl.setAttribute("y2",p2.cy);floorG.appendChild(fl);
}
for(var gj=-2;gj<=3;gj++){
  var q1=isoProject(-1*COL_W,gj*COL_D,0);
  var q2=isoProject(4*COL_W,gj*COL_D,0);
  var gl=document.createElementNS("http://www.w3.org/2000/svg","line");
  gl.setAttribute("stroke","#E0D4C0");gl.setAttribute("stroke-width",".4");gl.setAttribute("opacity",".4");
  gl.setAttribute("x1",q1.cx);gl.setAttribute("y1",q1.cy);
  gl.setAttribute("x2",q2.cx);gl.setAttribute("y2",q2.cy);floorG.appendChild(gl);
}

// 3D柱体
var colsG=document.getElementById("columnsGroup");
var lblG=document.getElementById("labelsGroup");

DATA.forEach(function(d,i){
  var px=(i-1.5)*48;
  var py=0;
  var h=d.mortH;

  var corners3D=[
    {x:px-COL_W/2,y:py-COL_D/2},
    {x:px+COL_W/2,y:py-COL_D/2},
    {x:px+COL_W/2,y:py+COL_D/2},
    {x:px-COL_W/2,y:py+COL_D/2}
  ];
  var b=corners3D.map(function(c){return isoProject(c.x,c.y,0)});
  var t=corners3D.map(function(c){return isoProject(c.x,c.y,h)});

  var g=document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("class","iso-group");
  g.dataset.idx=i;
  g.style.animationDelay=(.12*i)+"s";

  var topCX=(t[0].cx+t[1].cx+t[2].cx+t[3].cx)/4;
  var topCY=Math.min(t[0].cy,t[1].cy,t[2].cy,t[3].cy);

  g.innerHTML=
    '<polygon points="'+b[3].cx+","+b[3].cy+" "+t[3].cx+","+t[3].cy+" "+t[0].cx+","+t[0].cy+" "+b[0].cx+","+b[0].cy+'" fill="'+d.cL+'" stroke="'+d.c+'" stroke-width=".6" opacity=".92"/>'+
    '<polygon points="'+b[3].cx+","+b[3].cy+" "+t[3].cx+","+t[3].cy+" "+t[2].cx+","+t[2].cy+" "+b[2].cx+","+b[2].cy+'" fill="'+d.cR+'" stroke="'+d.c+'" stroke-width=".6" opacity=".88"/>'+
    '<polygon points="'+t[0].cx+","+t[0].cy+" "+t[1].cx+","+t[1].cy+" "+t[2].cx+","+t[2].cy+" "+t[3].cx+","+t[3].cy+'" fill="'+d.c+'" stroke="'+d.cL+'" stroke-width=".65" opacity=".96"/>'+
    '<text class="mortality-tag" x="'+topCX+'" y="'+(topCY-5)+'" fill="#BF360C">'+d.mortPct+'</text>';
  colsG.appendChild(g);

  // 标签
  var labelCX=(b[0].cx+b[2].cx)/2;
  var labelCY=b[2].cy+14;

  var lt=document.createElementNS("http://www.w3.org/2000/svg","text");
  lt.setAttribute("class","stage-label");lt.setAttribute("x",labelCX);lt.setAttribute("y",labelCY);
  lt.setAttribute("text-anchor","middle");lt.setAttribute("fill","#5D4037");
  lt.textContent=d.name;
  lblG.appendChild(lt);

  var bt=document.createElementNS("http://www.w3.org/2000/svg","text");
  bt.setAttribute("class","brief-text");bt.setAttribute("x",labelCX);bt.setAttribute("y",labelCY+9);
  bt.textContent=d.time;
  lblG.appendChild(bt);
});

// 交互
var tipBox=document.getElementById("tipBox");
var tipTitle=document.getElementById("tipTitle");
var tipTime=document.getElementById("tipTime");
var tipReq=document.getElementById("tipReq");
var tipRisk=document.getElementById("tipRisk");
var tipSrc=document.getElementById("tipSrc");

function showInfo(i){
  var d=DATA[i];tipTitle.textContent=d.name;
  tipTime.innerHTML="时间范围：<span class=\"tip-val\">"+d.time+"</span>";
  tipReq.innerHTML="核心要求：<span class=\"tip-val\">"+d.req+"</span>";
  tipRisk.innerHTML="死亡风险：<span class=\"tip-val\">"+d.risk+"</span>";
  tipSrc.innerHTML="来源：<span class=\"tip-val\">"+d.src+"</span>";
  tipBox.classList.add("show");
  var groups=document.querySelectorAll(".iso-group");
  for(var k=0;k<groups.length;k++){groups[k].classList.remove("active")}
  groups[i].classList.add("active");
}
function hideInfo(){
  tipBox.classList.remove("show");
  var groups=document.querySelectorAll(".iso-group");
  for(var k=0;k<groups.length;k++){groups[k].classList.remove("active")}
}

var isoGroups=document.querySelectorAll(".iso-group");
for(var j=0;j<isoGroups.length;j++){
  (function(idx){
    isoGroups[idx].addEventListener("mouseenter",function(){showInfo(idx)});
    isoGroups[idx].addEventListener("mouseleave",function(){hideInfo()});
    isoGroups[idx].addEventListener("click",function(){showInfo(idx)});
  })(j);
}
document.querySelector(".chart-wrap").addEventListener("mouseleave",hideInfo);
</script>
</body>
</html>
